{% extends 'dashboard/base.html' %}
{% block title %}{{ action }} Coupon{% endblock %}
{% block page_title %}{{ action }} Coupon{% endblock %}
{% block nav_coupons %}active{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <form method="post">
      {% csrf_token %}
      <div class="form-section">
        <div class="form-group">
          <label>Coupon Code *</label>
          <input type="text" name="code" class="form-control text-uppercase" placeholder="e.g. SAVE20" required maxlength="20">
          <small class="text-muted">Will be stored in uppercase.</small>
        </div>
        <div class="form-row">
          <div class="form-group col-md-6">
            <label>Discount Type *</label>
            <select name="discount_type" class="form-control">
              <option value="percent">Percentage (%)</option>
              <option value="flat">Flat Amount (Rs.)</option>
            </select>
          </div>
          <div class="form-group col-md-6">
            <label>Discount Value *</label>
            <input type="number" name="discount_value" class="form-control" min="1" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group col-md-6">
            <label>Minimum Order Amount (Rs.)</label>
            <input type="number" name="min_order_amount" class="form-control" value="0" min="0">
          </div>
          <div class="form-group col-md-6">
            <label>Max Uses</label>
            <input type="number" name="max_uses" class="form-control" value="100" min="1">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group col-md-6">
            <label>Valid From *</label>
            <input type="date" name="valid_from" class="form-control" value="{{ today }}" required>
          </div>
          <div class="form-group col-md-6">
            <label>Valid To *</label>
            <input type="date" name="valid_to" class="form-control" required>
          </div>
        </div>
        <div class="d-flex">
          <button class="btn btn-success px-4">Create Coupon</button>
          <a href="{% url 'dashboard_coupons' %}" class="btn btn-outline-secondary ml-3">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
